plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.usbthermalprinter'
version = '0.1.0'

android {
  namespace "expo.modules.usbthermalprinter"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation 'org.opencv:opencv:4.13.0'
}
